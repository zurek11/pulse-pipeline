global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "pulse-api"
    static_configs:
      - targets: ["api:8080"]

  - job_name: "pulse-consumer"
    static_configs:
      - targets: ["consumer:8081"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
